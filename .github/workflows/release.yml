name: Release
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 8
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - run: pnpm benchmark:smoke
      - run: pnpm pack:dry
      - name: Check npm version
        id: npm_version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.npm_version.outputs.exists == 'false'
        run: |
          echo "Package version is not on npm yet."
          echo "Publish manually with: npm publish --access public"
          echo "Then rerun this workflow or create the GitHub release."
